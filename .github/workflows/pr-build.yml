name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
     name: Lint Check
     runs-on: ubuntu-latest

     steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

  test:
     name: Test Check
     runs-on: ubuntu-latest

     steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless

  build:
     name: Build Check
     needs: [lint, test]
     runs-on: ubuntu-latest

     steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  accessibility:
     name: Accessibility Check
     needs: [build]
     runs-on: ubuntu-latest

     steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Serve app
        run: npx serve dist/hello-angular-actions/browser -p 4200 &

      - name: Wait for server
        run: npx wait-on http://localhost:4200

      - name: Run accessibility checks
        run: npx pa11y-ci